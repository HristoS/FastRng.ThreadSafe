name: Build & Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*' # Triggers automatically when you push a version tag like v1.0.3
  workflow_dispatch:
    inputs:
      manual_version:
        description: 'Version (e.g., 1.0.5)'
        required: false
        type: string
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: production # Connects to your NuGet production environment
    permissions:
      id-token: write # Mandatory permission token for secure passwordless login
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Matches your .NET 10 optimization

      - name: Restore Dependencies
        run: dotnet restore

      - name: Compile Solution
        run: dotnet build --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Extract Version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.manual_version }}" ]; then
            echo "VERSION=${{ github.event.inputs.manual_version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Pack NuGet Package
        run: |
          dotnet pack src/FastRng.ThreadSafe.csproj --configuration Release \
            -p:PackageVersion=${{ steps.get_version.outputs.VERSION }} \
            --output ./artifacts

    # nuRequest the token from GitHub and exchange it with NuGet.org
      - name: NuGet Login
        uses: nuget/login@v1
        id: oidc_login
        with:
          user: 'HristoS' # Your exact profile username
          
      - name: Publish to NuGet.org
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.oidc_login.outputs.NUGET_API_KEY }} \
            --skip-duplicate
